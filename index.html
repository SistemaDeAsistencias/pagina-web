<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Asistencia</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
        }
        .loader {
            border: 8px solid #f3f3f3;
            border-top: 8px solid #3498db;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .mensaje {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
        }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <div class="loader"></div>
        <div class="mensaje">Verificando sesión...</div>
    </div>

    <script>
        // Consultar estado de sesión al cargar la página
        fetch('php/verificarSesion.php')
            .then(response => response.json())
            .then(data => {
                if (data.loggedIn) {
                    // Redirigir según rol
                    if (data.rol_id === 1) window.location.href = 'admin/dashboard.php';
                    else if (data.rol_id === 2) window.location.href = 'docente/dashboard.php';
                    else if (data.rol_id === 3) window.location.href = 'estudiante/consulta.php';
                    else window.location.href = 'login.html';
                } else {
                    window.location.href = 'login.html';
                }
            })
            .catch(() => {
                window.location.href = 'login.html';
            });
    </script>
</body>
</html>
